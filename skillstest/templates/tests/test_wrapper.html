function jsdatetomysqldatetime(jsdate){
    jsdateparts = jsdate.split(" ");
    mon = jsdateparts[1];
    mm = months[mon];
    dd = jsdateparts[2];
    yyyy = jsdateparts[3];
    timepart = jsdateparts[4];
    mysqldate = yyyy + "-" + mm + "-" + dd + " " + timepart;
    return(mysqldate);
}

function sendresponse(){
    var challengestatement = "";
    var challengetype = "";
    var oneormore = "";
    var challengeid = -1;
    var testid = -1;
    var useremail = "";
    var tabref = "";
    var tabid = -1;
    if(document.frmchallenge){
        challengestatement = document.frmchallenge.challengestatement.value;
        challengetype = document.frmchallenge.challengetype.value;
    	oneormore = document.frmchallenge.oneormore.value; // The value of this is meaningless if challengetype is not 'MULT'
    	challengeid = document.frmchallenge.challengeid.value;
    	testid = document.frmchallenge.testid.value;
    	useremail = document.frmchallenge.useremail.value;
    	tabref = document.frmchallenge.tabtype.value;
    	tabid = document.frmchallenge.tabid.value;
        var postdata = "mode=0&challengestatement=" + challengestatement + "&challengetype=" + challengetype + "&oneormore=" + oneormore + "&challengeid=" + challengeid + "&testid=" + testid + "&useremail=" + useremail + "&tabref=" + tabref + "&tabid=" + tabid;
        if(challengetype == 'CODN' || challengetype == 'SUBJ' || challengetype == 'ALGO'){
            txtareanamepattern = new RegExp("^id_\\d+$");
            allelements = document.frmchallenge.elements;
            for(var i=0; i < allelements.length; i++){
                elemname = allelements[i].name;
                if(txtareanamepattern.test(elemname)){
                    postdata += "&" + elemname + "=" + allelements[i].value;
                    break;
                }
            }
        }
        else if(challengetype == 'MULT'){
            allelements = document.frmchallenge.elements;
            if(oneormore == "false"){ //will get radio buttons.
                radioidpattern = new RegExp("^rdoption_\\d+$");
                for(var i=0; i < allelements.length; i++){
                    elemid = allelements[i].id;
                    if(radioidpattern.test(elemid)){
                        if(allelements[i].checked == true){
                            postdata += "&rdoption=" + allelements[i].value;
                            break;
                        }
                    }
                }
            }
            else{ // will get checkboxes.
                checkboxpattern = new RegExp("^option_\\d+$");
                for(var i=0; i < allelements.length; i++){
                    elemname = allelements[i].name;
                    if(checkboxpattern.test(elemname)){
                        if(allelements[i].checked == true){
                            postdata += "&" + elemname + "=" + allelements[i].value;
                        }
                    }
                }
            }
        }
        else if(challengetype == 'FILB'){
            filbpattern = new RegExp("^filb_\\d+$");
            allelements = document.frmchallenge.elements;
            for(var i=0; i < allelements.length; i++){
                elemname = allelements[i].name;
                if(filbpattern.test(elemname)){
                    postdata += "&filb=" + allelements[i].value;
                    break;
                }
            }
        }
        else{ // unrecognized challenge type.
        }
        var encpostdata = encodeURI(postdata)
        //alert(encpostdata);
        sendtoserver(encpostdata);
    }
}


// Random List generation code -- The next 3 functions generate a random list
// of numbers between a minimum and a maximum value.
function random_number(min,max){
    return (Math.round((max-min) * Math.random() + min));
}


function create_unique_random_array(num_elements,min,max){
    var temp, nums = new Array();
    for (var element=0; element<num_elements; element++){
        while((temp=number_found(random_number(min,max),nums))==-1);
        nums[element] = temp;
    }
    return (nums);
}


function number_found (random_number,number_array) {
    for (var element=0; element<number_array.length; element++) {
        if (random_number==number_array[element]) {
            return (-1);
	}
    }
    return (random_number);
}
// Random list generation code ends here.

function getruleset(encjson){
    decrypteddata = Base64.decode(encjson);
    jsonobj = JSON.parse(decrypteddata);
    ruleslist = jsonobj.rules;
    showatonceflag = 1;
    allowchallengenavflag = 2;
    ruleflag = 0;
    for(var i=0; i < ruleslist.length; i++){
        flagvalue = ruleslist[i];
        if(flagvalue == 'showatonce'){
            ruleflag += showatonceflag;
        }
        else if(flagvalue == 'allowchallengenavigation'){
            ruleflag += allowchallengenavflag;
        }
    }
    return (ruleflag); // Possible values are 0, 1, 2, 3.
}

function restorepagedata(rawdata){
    rawdataparts = rawdata.split(/\]\,\[?/);
    //alert(rawdataparts);
    testpages = new Array();
    for(i=0; i < Object.size(rawdataparts) - 1; i++){
	testpages[i] = Array();
	twoparts = rawdataparts[i].split(/<\/form>\"\,/);
 	if(i == 0){
	    twoparts[0] = twoparts[0].substring(3) + "</form>";
	}
	else{
	    twoparts[0] = twoparts[0] + "</form>";
	}
	newlist = new Array();
	newlist[0] = twoparts[0];
	if(twoparts[1] && twoparts[1] != undefined){
            twopartssecond = twoparts[1].split(/\,\"/);
	}
	//alert(twopartssecond[1] + "===================");
	newlist[1] = twopartssecond[0];
 	twopartssecond[1] = twopartssecond[1].replace('\\"', "");
	twopartssecond[1] = twopartssecond[1].replace('"', '');
	newlist[2] = twopartssecond[1];
	testpages[i] = newlist;
    }
    testpages[Object.size(rawdataparts) - 1] = rawdataparts[Object.size(rawdataparts) - 1];
    return(testpages);
}


function displaychallengescreen(challengelistencstr, ctr, index, randomliststr, enctestpages, starttime, mytime, ruleflag, tabref, tabid, encqalist){
    // We keep all the data structures passed in as strings and convert them to their Object format as and when required.
    // JSON.parse doesn't work for serialized arrays
    window.clearTimeout(mytime);
    randomlist = JSON.parse(Base64.decode(randomliststr));
    for(var j=0; j < randomlist.length; j++){
 	try {
            randomlist[j] = randomlist[j].replace('"', '');
            randomlist[j] = parseInt(randomlist[j]);
	}
	catch (err){
	    //alert(err.message);
	    continue;
	}
    }
    challengelist = JSON.parse(Base64.decode(challengelistencstr));
    rawtestpages = Base64.decode(enctestpages);
    testpages = restorepagedata(rawtestpages);
    challengerec = challengelist[ctr];
    challengestatement = challengerec[0];
    //alert(challengestatement);
    qalist = JSON.parse(Base64.decode(encqalist));
    start = 0;
    if(ruleflag == 3){
        end = randomlist.length;
    }
    else{
	end = Object.size(qalist);
    }
    qareadiv.innerHTML = "<center>" + scrollclockhtml() + "</center><br />";
    clock();
    timeout = 0;
    // Display the challenge and set the timeout interval.
    // If the challenge exists in 'qalist', then adjust the timeout limit and user's response as per the values in 'qalist'.
    for(var i=start; i < end; i++){
	elem = randomlist[i];
	if(testpages[elem][2].toUpperCase() == challengestatement.toUpperCase()){
	    timeout = testpages[elem][1] * 1000 - qalist[i][1];
	    //alert(timeout);
	    if(ruleflag == 3){
	        challengescreen = testpages[elem][0];
	    }
	    else{
		challengescreen = qalist[i][2];
	    }
	    alert(challengescreen);
	    //alert(testpages[elem][1]);
	    qareadiv.innerHTML += challengescreen;
	    break;
	}
    } // outer for loop ends.
    mytime = window.setTimeout(showchallenge, timeout, index, randomlist, testpages, starttime, mytime, ruleflag, tabref, tabid, timeout);
    // Thats it. We are done! The rest of the task will happen when the 'showchallenge' function gets called.
}

function nextchallenge(index, randomlist, testpages, starttime, mytime, ruleflag, tabref, tabid, challengestarttime_ms){
    window.clearTimeout(mytime);
    challengeendtime = new Date();
    challengeendtime_ms = challengeendtime.getTime();
    timeelapsed = (challengeendtime_ms - challengestarttime_ms); // This is timeelapsed in milliseconds.
    bchallenge = document.getElementById('bchallenge');
    challengestatement = bchallenge.innerHTML;
    listitem = {};
    qareadiv = document.getElementById('qarea');
    divcontents = qareadiv.innerHTML;
    listitem[2] = divcontents;
    listitem[0] = challengestatement;
    elem = randomlist[index];
    listitem[1] = testpages[elem][1] - timeelapsed;
    qalist[Object.size(qalist)] = listitem;
    index = index + 1;
    mytime = showchallenge(index, randomlist, testpages, starttime, mytime, ruleflag, tabref, tabid, timeelapsed);
}


function showchallenge(index, randomlist, testpages, starttime, mytime, ruleflag, tabref, tabid, timeelapsed){
    timeelapsed = timeelapsed || 0;
    if(Object.size(qalist) > 0){
	ll = qalist[Object.size(qalist) - 1];
	//alert(ll);
	ll[1] = timeelapsed;
	qalist[Object.size(qalist) - 1] = ll;
    }
    qareadiv = document.getElementById('qarea');
    divcontents = qareadiv.innerHTML;
    if(divcontents != ""){
        sendresponse();
    }
    qareadiv.innerHTML = "<center>" + scrollclockhtml() + "</center><br />";
    qareadiv.innerHTML += "<center><font color='#0000AA' style='font-weight:bold;' size=+1>{{testname}}</center><br />";
    clock();
    elem = randomlist[index];
    if(index >= testpages.length){ // Test is over.
        var jstime = new Date();
        endtime = jsdatetomysqldatetime(String(jstime));
        qareadiv.innerHTML += nomorechallenges('{{ testname }}', '{{ testid }}', starttime, tabref, tabid);

        //alert(postdata);
        sendtoserver(postdata);
	listitem = {};
    	listitem[2] = qareadiv.innerHTML;
    	listitem[0] = "";
    	listitem[1] = 0; // time elapsed.
    	qalist[Object.size(qalist)] = listitem;
    	populateleftpanel2(ruleflag, qalist, index-1, randomlist, testpages, starttime, mytime, tabref, tabid);
	return;
    }
    qareadiv.innerHTML += testpages[elem][0];
    nextduration = (testpages[randomlist[index]][1] * 1000);
    challengestarttime = new Date();
    challengestarttime_ms = challengestarttime.getTime();
    //index = index + 1;
    window.clearTimeout(mytime);
    mytime = window.setTimeout(showchallenge, nextduration, index + 1, randomlist, testpages, starttime, mytime, ruleflag, tabref, tabid, (timeelapsed + nextduration));

    populateleftpanel2(ruleflag, qalist, index, randomlist, testpages, starttime, mytime, tabref, tabid);
}

function getchallenges(encjson, starttime, mytime, ruleflag){
    decrypteddata = Base64.decode(encjson);
    jsonobj = JSON.parse(decrypteddata);
    qareadiv = document.getElementById('qarea');
    qareadiv.innerHTML = "";
    challengeslist = Object.keys(jsonobj.challenges);
    randomsequencing = jsonobj.randomsequencing;
    pages = Array();
    testname = jsonobj.testname;
    optionpattern = new RegExp("^option\\d");
    pagectr = 0;
    if(ruleflag == 1){
	alllist = new Array();
    }
    for (challenge in jsonobj.challenges){
        pages[pagectr] = Array();
        pages[pagectr][0] = "<form name='frmchallenge' id='frmchallenge' method='POST' action=''>";
        pages[pagectr][0] += "<b id='bchallenge'>" + challenge + "</b><br />";
        if(jsonobj.challenges[challenge].mediafile != null && jsonobj.challenges[challenge].mediafile != ''){
            var imgpath = "media/" + jsonobj.creator + "/tests/" + jsonobj.testid + "/" + jsonobj.challenges[challenge].mediafile;
            pages[pagectr][0] += "<img src='" + imgpath + "' height='200' width='300'><br />";
        }
        if(jsonobj.challenges[challenge].additionalurl != ''){
            pages[pagectr][0] += "Please also refer <a href='" + jsonobj.challenges[challenge].additionalurl + "'>here</a> for some relevant information.<br />";
        }
        if(jsonobj.challenges[challenge].challengetype == 'SUBJ' || jsonobj.challenges[challenge].challengetype == 'ALGO'){
            pages[pagectr][0] += "<b>Enter response:</b><br /><textarea name='id_" + jsonobj.challenges[challenge].chid + "' id='id_" + jsonobj.challenges[challenge].chid + "' rows='2' cols='10' style='width:600px;height:200px;border:1px solid #0000AA;'></textarea><br /><br />";
        }
        else if(jsonobj.challenges[challenge].challengetype == 'CODN'){ // Get and embed editor from codemirror
	    //alert(pages[pagectr][0]);
            pages[pagectr][0] += "<b>Enter response:</b><br /><textarea name='id_" + jsonobj.challenges[challenge].chid + "' id='id_" + jsonobj.challenges[challenge].chid + "' rows='2' cols='10' style='width:600px;height:200px;border:1px solid #0000AA;'></textarea><br /><br />";
	    //pages[pagectr][0] += "<scr" + "ipt language='javascript'>var myCodeMirror = CodeMirror.fromTextArea(id_" + jsonobj.challenges[challenge].chid + ");</scr" + "ipt>";// Avoid running the javascript code at this phase.
        }
        else if(jsonobj.challenges[challenge].challengetype == 'MULT'){
            pages[pagectr][0] += "<b>Select from below:</b><br />";
            optionctr = 1;
            if(jsonobj.challenges[challenge].oneormore){
                for (key in jsonobj.challenges[challenge]){
                    if(optionpattern.test(key)){
                        pages[pagectr][0] += "<input type='checkbox' name='option_" + optionctr + "' id='option_" + optionctr + "' value='" + jsonobj.challenges[challenge][key] + "'>&nbsp;&nbsp;<b>" + jsonobj.challenges[challenge][key] + "</b><br />";
                        optionctr++;
                    }
                }
            }
            else{
                for (key in jsonobj.challenges[challenge]){
                    if(optionpattern.test(key)){
                        pages[pagectr][0] += "<input type='radio' name='rdoption' id='rdoption_" + optionctr + "' value='" + jsonobj.challenges[challenge][key] + "'>&nbsp;&nbsp;<b>" + jsonobj.challenges[challenge][key] + "</b><br />";
                        optionctr++;
                    }
                }
            }
        }
        else if(jsonobj.challenges[challenge].challengetype == 'FILB'){
            pages[pagectr][0] += "<b>Fill in the blank: </b><input type='text' name='filb_" + jsonobj.challenges[challenge].chid + "' style='width:600px;border:1px solid #000000;'><br />";
        }
        pages[pagectr][0] += "<br /><font size=-1>Time Alloted for this challenge: " + jsonobj.challenges[challenge].timeframe + " seconds</font><br />";
        pages[pagectr][0] += "<font size=-1>Score on this challenge: " + jsonobj.challenges[challenge].challengescore + "</font><br />";
	//alert(ruleflag + "sssss");
        pages[pagectr][0] += "<input type='button' name='btnnextchallenge' id='btnnextchallenge' value='Next Challenge' onClick='javascript:nextchallenge(1, \"" + randomlist.toString() + "\", \"" + testpages.toString() + "\", \"" + starttime + "\", \"" + mytime + "\", \"" + ruleflag + "\", \"" + jsonobj.tabtype + "\", " + jsonobj.tabid + ");'>&nbsp;&nbsp;<input type='button' name='btnendtest' value='End test' onClick='javascript:endtest(\"" + testname + "\", {{ testid }}, \"" + starttime + "\", \"" + jsonobj.tabtype + "\", \"" + jsonobj.tabid + "\");'>"; 
        pages[pagectr][0] += "<input type='hidden' name='challengetype' id='challengetype' value='" + jsonobj.challenges[challenge].challengetype + "'><input type='hidden' name='oneormore' id='oneormore' value='" + jsonobj.challenges[challenge].oneormore + "'><input type='hidden' name='challengestatement' id='challengestatement' value='" + challenge + "'><input type='hidden' name='challengeid' id='challengeid' value='" + jsonobj.challenges[challenge].chid + "'><input type='hidden' name='testid' value='" + jsonobj.testid + "'><input type='hidden' name='useremail' id='useremail' value='" + Base64.encode(jsonobj.targetemail) + "'><input type='hidden' name='tabtype' value='" + jsonobj.tabtype + "'><input type='hidden' name='tabid' value='" + jsonobj.tabid + "'>";
        pages[pagectr][0] += "</form>";
        pages[pagectr][1] = jsonobj.challenges[challenge].timeframe;
	pages[pagectr][2] = challenge;

        if(ruleflag == 1){
	    listitem = new Array();
	    listitem[0] = challenge;
	    listitem[1] = pages[pagectr][0];
	    alllist[alllist.length] = listitem;
    	}
        pagectr++;
    }
    return(pages);
}
