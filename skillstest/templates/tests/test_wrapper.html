var months = {};
months = { 'Jan' : '01', 'Feb' : '02', 'Mar' : '03', 'Apr' : '04', 'May' : '05', 'Jun' : '06', 'Jul' : '07', 'Aug' : '08', 'Sep' : '09', 'Oct' : '10', 'Nov' : '11', 'Dec' : '12' };

function jsdatetomysqldatetime(jsdate){
    jsdateparts = jsdate.split(" ");
    mon = jsdateparts[1];
    mm = months[mon];
    dd = jsdateparts[2];
    yyyy = jsdateparts[3];
    timepart = jsdateparts[4];
    mysqldate = yyyy + "-" + mm + "-" + dd + " " + timepart;
    return(mysqldate);
}

}

function starttest(rules, progenv, quality, maxscore, duration, allowedlanguages, topicname, challengescount, testname, encjson){
    var allowedlanguagesjson = '{{ answering_languages }}';
    var rulesjson = '{{ rules }}';
    var skillqualityjson = '{{ skill_quality }}';
    allowedlanguagesdict = JSON.parse(allowedlanguagesjson);
    rulesdict = JSON.parse(rulesjson);
    skillqualitydict = JSON.parse(skillqualityjson);
    testtakerdiv = document.getElementById('testtaker');
    testtakerdiv.innerHTML = "";
    testtakerdiv.innerHTML += "<center>" + scrollclockhtml() + "</center><br />";
    testtakerdiv.innerHTML += "<br /><center><h2>" + jsonobj.testname + "</h2></center><br /><br />";
    testtakerdiv.innerHTML += "<h3>Rules:</h3><br />";
    ruleslist = rules.split(",");
    for (var rulectr = 0; rulectr < ruleslist.length; rulectr++){
        testtakerdiv.innerHTML += "<b>" + (rulectr + 1) + ". " + rulesdict[ruleslist[rulectr]] + "</b><br />";
    }
    testtakerdiv.innerHTML += "<br /><br /><b>Please note the following: </b><br />";
    if(progenv != ""){
        testtakerdiv.innerHTML += "You will be using a '" + progenv + "' programming environment while taking this test.<br />";
    }
    testtakerdiv.innerHTML += "This test is intended for " + skillqualitydict[quality] + " quality candidates.<br />";
    testtakerdiv.innerHTML += "The total marks is " + maxscore + ".<br />";
    durationinmins = (duration/60);
    if (durationinmins < 60){
        testtakerdiv.innerHTML += "The duration of this test is " + durationinmins + " minutes.<br />";
    }
    else{
        durationinhours = (durationinmins/60) + " hours";
        if(durationinmins % 60 > 0){
            durationinhours += " and " + durationinmins % 60 + " minutes";
        }
        testtakerdiv.innerHTML += "The duration of this test is " + durationinhours + ".<br />";
    }
    testtakerdiv.innerHTML += "There are " + challengescount + " questions in this test.<br />";
    testtakerdiv.innerHTML += "You may answer this test in any of the following languages: ";
    allowedlanguageslist = allowedlanguages.split(",");
    var langctr = 0;
    for (langctr = 0; langctr < allowedlanguageslist.length - 1; langctr++){
        testtakerdiv.innerHTML += allowedlanguagesdict[allowedlanguageslist[langctr]] + ", ";
    }
    if(allowedlanguageslist.length > 1){
        testtakerdiv.innerHTML += " and " + allowedlanguagesdict[allowedlanguageslist[allowedlanguageslist.length - 1]] + ".<br />";
    }
    else{
        testtakerdiv.innerHTML += allowedlanguagesdict[allowedlanguageslist[allowedlanguageslist.length - 1]] + ".<br />";
    }
    testtakerdiv.innerHTML += "This test falls in the '" + topicname + "' category.<br /><br />";
    testtakerdiv.innerHTML += "<center><input type='button' name='facethemusic' value='Start Answering' onClick='javascript:facethemusic(\"" + encjson + "\");'>&nbsp;&nbsp;<input type='button' name='endtest' value='End Test' onClick='javascript:endtest(\"" + testname + "\", {{ testid }});'></center>";
    clock();
    starttime = new Date();
    starttime = jsdatetomysqldatetime(String(starttime));
    postdata = encodeURI("starttest=1&starttime=" + starttime + "&testid={{ testid }}&useremail=" + Base64.encode('{{ targetemail }}'));
    //alert(postdata);
    sendtoserver(postdata);
}

// Random List generation code -- The next 3 functions generate a random list
// of numbers between a minimum and a maximum value.
function random_number(min,max){
    return (Math.round((max-min) * Math.random() + min));
}

function create_unique_random_array(num_elements,min,max){
    var temp, nums = new Array();
    for (var element=0; element<num_elements; element++){
        while((temp=number_found(random_number(min,max),nums))==-1);
        nums[element] = temp;
    }
    return (nums);
}

function number_found (random_number,number_array) {
    for (var element=0; element<number_array.length; element++) {
        if (random_number==number_array[element]) {
            return (-1);
	}
   }
    return (random_number);
}
// Random list generation code ends here.

function facethemusic(encjson){
    testpages = getchallenges(encjson);
    decrypteddata = Base64.decode(encjson);
    jsonobj = JSON.parse(decrypteddata);
    randomsequencing = jsonobj.randomsequencing;
    countchallenges = testpages.length;
    minimum = 0;
    maximum = (countchallenges - 1);
    var randomlist = create_unique_random_array(countchallenges, minimum, maximum);
    testtakerdiv = document.getElementById('testtaker');
    testtakerdiv.innerHTML += "<center>" + scrollclockhtml() + "</center><br />";
    clock();
    for (index in randomlist){
        elem = randomlist[index];
        testtakerdiv.innerHTML += testpages[elem][0];
        interval = testpages[elem][1];
        mytime = window.setTimeout(sendresponse, (interval * 1000));
        window.clearTimeout(mytime);
    }
}

function getchallenges(encjson){
    decrypteddata = Base64.decode(encjson);
    jsonobj = JSON.parse(decrypteddata);
    testtakerdiv = document.getElementById('testtaker');
    testtakerdiv.innerHTML = "";
    challengeslist = Object.keys(jsonobj.challenges);
    randomsequencing = jsonobj.randomsequencing;
    pages = Array();
    optionpattern = new RegExp("^option\\d");
    pagectr = 0;
    for (challenge in jsonobj.challenges){
        pages[pagectr] = Array();
        pages[pagectr][0] = "<b>" + challenge + "</b><br />";
        if(jsonobj.challenges[challenge].mediafile != 'null'){
            var imgpath = "";
            pages[pagectr][0] += "<img src='" + imgpath + "'><br />";
        }
        if(jsonobj.challenges[challenge].additionalurl != ''){
            pages[pagectr][0] += "Please also refer <a href='" + jsonobj.challenges[challenge].additionalurl + "'>here</a> for some relevant information.<br />";
        }
        if(jsonobj.challenges[challenge].challengetype == 'SUBJ' || jsonobj.challenges[challenge].challengetype == 'ALGO'){
            pages[pagectr][0] += "<b>Enter response:</b><br /><textarea name='id_" + jsonobj.challenges[challenge].chid + "' id='id_" + jsonobj.challenges[challenge].chid + "' numrows='2' numcols='10'></textarea><br /><br />";
        }
        else if(jsonobj.challenges[challenge].challengetype == 'CODN'){ // Get editor from cloud9
            pages[pagectr][0] += "<b>Enter response:</b><br /><textarea name='id_" + jsonobj.challenges[challenge].chid + "' id='id_" + jsonobj.challenges[challenge].chid + "' numrows='2' numcols='10'></textarea><br /><br />";
        }
        else if(jsonobj.challenges[challenge].challengetype == 'MULT'){
            pages[pagectr][0] += "<b>Select from below:</b><br />";
            optionctr = 1;
            if(jsonobj.challenges[challenge].oneormore){
                for (key in jsonobj.challenges[challenge]){
                    if(optionpattern.test(key)){
                        pages[pagectr][0] += "<input type='checkbox' name='option_" + optionctr + "' id='option_" + optionctr + "' value='" + jsonobj.challenges[challenge][key] + "'>&nbsp;&nbsp;<b>" + jsonobj.challenges[challenge][key] + "</b><br />";
                        optionctr++;
                    }
                }
            }
            else{
                for (key in jsonobj.challenges[challenge]){
                    if(optionpattern.test(key)){
                        pages[pagectr][0] += "<input type='radio' name='option_" + optionctr + "' id='option_" + optionctr + "' value='" + jsonobj.challenges[challenge][key] + "'>&nbsp;&nbsp;<b>" + jsonobj.challenges[challenge][key] + "</b><br />";
                        optionctr++;
                    }
                }
            }
        }
        else if(jsonobj.challenges[challenge].challengetype == 'FILB'){
            pages[pagectr][0] += "<b>Fill in the blank: </b><input type='text' name='id_" + jsonobj.challenges[challenge].chid + "'><br />";
        }
        pages[pagectr][0] += "<font size=-1>Time Allocated for this challenge: " + jsonobj.challenges[challenge].timeframe + "</font><br />";
        pages[pagectr][0] += "<font size=-1>Score on this challenge: " + jsonobj.challenges[challenge].challengescore + "</font><br />";
        pages[pagectr][0] += "<input type='button' name='nextchallenge' id='nextchallenge' onClick='javascript:nextchallenge();'>";
        pages[pagectr][1] = challenge.timeframe;
        pagectr++;
    }
    return(pages);
}


function handletest(encjson, jsonobj){
    testtakerdiv = document.getElementById('testtaker');
    testtakerdiv.style = '';
    testtakerdiv.innerHTML = "<center><h2>" + jsonobj.testname + "</h2></center><br /><center><h3> - " + jsonobj.creator + "</h3></center>";
    testtakerdiv.innerHTML += "<span><b>You may start taking this test by clicking on the 'Start Test' button below. Alternatively,<br />you may come back to take this test later.</b></span>";
    numchallenges = Object.keys(jsonobj.challenges).length;
    testtakerdiv.innerHTML += "<br /><center><input type='button' name='starttest' value='Start Test' onClick='javascript:starttest(\"" + jsonobj.rules + "\", \"" + jsonobj.progenv + "\", \"" + jsonobj.quality+ "\", \"" + jsonobj.maxscore + "\", \"" + jsonobj.duration + "\", \"" + jsonobj.allowedlanguages + "\", \"" + jsonobj.topicname + "\", \"" + numchallenges + "\", \"" + jsonobj.testname + "\", \"" + encjson + "\");'>&nbsp;&nbsp;<input type='button' name='notnow' value='No, not now' onClick='javascript:closetest();'></center>";
}
