<script type='text/javascript'>
blink_speed = 500; // every 500 == 0.5 second
setInterval(function () {
    ele = document.getElementById('catchattention');
    ele.style.color = (ele.style.color == '#0000FF' ? '#00FF00' : '#0000FF');
}, blink_speed);
</script>

<a id="start_oauth2" href="#/" onClick="window.open('https://wepay.com/v2/oauth2/authorize?client_id={{client_id}}&amp;scope=manage_accounts,collect_payments,view_user,send_money,preapprove_payments&amp;redirect_uri={{redirect_uri}}&amp;user_name={{user_name}}&amp;user_email={{email}}&amp;state=robot&amp;popup=1', 'authwin', 'width=400, height=400, location=yes, menubar=no, scrollbars=yes,toolbar=no,  titlebar=no, resizable=no, status=no')"><div id='catchattention' style='color:#00AAFF;font-weight:bold;'>Click here to withdraw using WePay account</div></a>

<script src="https://static.wepay.com/min/js/wepay.v2.js" type="text/javascript"></script>
<script type="text/javascript">

WePay.set_endpoint("production"); // stage or production

WePay.OAuth2.button_init(document.getElementById('start_oauth2'), {
    "client_id":"{{client_id}}",
     "scope":["manage_accounts","collect_payments","view_user","send_money","preapprove_payments"],
    "user_name":"{{user_name}}",
    "user_email":"{{email}}",
    "redirect_uri":"{{redirect_uri}}",
    "top":100, // control the positioning of the popup with the top and left params
    "left":100,
    "state":"register", // this is an optional parameter that lets you persist some state value through the flow
    "callback":function(data) {
		/** This callback gets fired after the user clicks "grant access" in the popup and the popup closes. The data object will include the code which you can pass to your server to make the /oauth2/token call **/
		if (data.code.length !== 0) {
		    var xmlhttp;
		    csrftags = document.getElementsByName('csrf');
                    csrfmiddlewaretoken = csrftags[0].value;
		    code = data['code'];
		    postdata = "csrfmiddlewaretoken=" + csrfmiddlewaretoken + "&code=" + code;
		    //alert(postdata);
		    statusdiv = document.getElementById('status');
		    if (window.XMLHttpRequest){
			xmlhttp=new XMLHttpRequest();
		    }
		    else{
			xmlhttp=new ActiveXObject("Microsoft.XMLHTTP");
		    }
		    xmlhttp.onreadystatechange = function(){
			if(xmlhttp.readyState == 4 && xmlhttp.status==200){
			    statusdiv.innerHTML = xmlhttp.responseText;
			}
		    };
		    withdrawurl = document.frmwithdraw.action;
		    xmlhttp.open('POST', "{{redirect_uri}}", true);
		    xmlhttp.send(postdata);
		    statusdiv.innerHTML = "<img src='static/images/loading_small.gif'>processing inputs... may take a l'il while. Please be patient.";
			
		} else {
			// an error has occurred and will be in data.error
		}
	}
});

</script>
<div id='status'></div>
